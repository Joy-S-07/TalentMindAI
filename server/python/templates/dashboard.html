<!DOCTYPE html>
<html>

<head>

<title>Workforce Intelligence Dashboard</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<h1>Workforce Intelligence Dashboard</h1>

<div class="dashboard">

    <div class="card">

        <h2>82%</h2>

        <p>Team Readiness</p>

    </div>

    <div class="card">

        <h2>5</h2>

        <p>Top Performers</p>

    </div>

    <div class="card">

        <h2>2</h2>

        <p>At Risk Employees</p>

    </div>

</div>

<h2 style="text-align:center;margin-top:50px;">
Workforce Analytics
</h2>

<div style="width:85%;max-width:900px;margin:auto;margin-top:30px;">

    <canvas id="myChart"></canvas>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const ctx =
document.getElementById('myChart');

new Chart(ctx, {

type:'bar',

data:{

labels:[
'Readiness',
'Top Performers',
'At Risk'
],

datasets:[{

label:'Workforce Metrics',

data:[
82,
5,
2
]

}]

}

});

</script>

</body>
</html>
